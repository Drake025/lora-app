workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      dart: stable
      android:
        - apiLevel: 34
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  web-workflow:
    name: Web Build
    max_build_duration: 60
    environment:
      flutter: stable
      dart: stable
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build Web
        script: |
          flutter build web --release
    artifacts:
      - build/web/**

  ios-workflow:
    name: iOS Build (macOS only)
    max_build_duration: 60
    environment:
      flutter: stable
      dart: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get dependencies
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
